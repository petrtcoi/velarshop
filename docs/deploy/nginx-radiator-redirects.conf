# Redirect removed radiator variant pages to the canonical model pages.
# Include this file inside the Nginx server {} block that serves dist/.

# Tubular radiator variants previously lived under /model/{series}/{variant}/.
# Their canonical model pages are /columns/{series}/.
location ~ ^/model/(3020|2030|3030|4030|2037|3037|4037|2040|3040|4040|2045|3045|4045|2050|3050|4050|2055|3055|4055|2057|3057|4057|2060|3060|4060|2075|3075|4075|2090|3090|4090|2100|3100|4100|2110|3110|4110|2120|3120|4120|2150|3150|4150|2180|3180|4180|2200|3200|4200)/.+/?$ {
    return 301 /columns/$1/;
}

# Design, convector, floor and retro variants now resolve to model-level pages.
location ~ ^/model/(r42v|r42h|p30v|p30h|p60v|p60h|sv|sh|spv|sph|q40v|q40h|q60v|q60h|q80v|q80h|r32v|r32h|r89v|r89h|rt1v|rt2v|rt1wv|qt1v|qt2v|q500|p200|p300|kwh|kwhv|kwhv24|nostalgia500|historic500|nostalgia300|historic300)/.+/?$ {
    return 301 /model/$1/;
}

# Legacy alias pages that currently use meta refresh + canonical.
# Prefer server-side 301 redirects when deployment config allows.
rewrite ^/convector/kwh/?$ /model/kwh/ permanent;
rewrite ^/convector/kwhv/?$ /model/kwhv/ permanent;
rewrite ^/convector/kwhv-24v/?$ /model/kwhv24/ permanent;
rewrite ^/retro/historic/?$ /model/historic500/ permanent;
rewrite ^/retro/nostalgia/?$ /model/nostalgia500/ permanent;
rewrite ^/info/oshibki-pri-vybore-radiatorov-otopleniya/?$ /info/oshibki-pri-vybore-radiatorov/ permanent;
rewrite ^/info/patina-i-tsveta-dlya-retro-radiatorov/?$ /info/tsvet-interera-i-radiator/ permanent;
rewrite ^/info/radiatory-dlya-panoramnyh-okon/?$ /info/radiatory-dlya-panoramnykh-okon-tipy-osobennosti/ permanent;
rewrite ^/info/radiatory-s-ornamentom-kachestvo-litya/?$ /info/kak-otlichit-kachestvennoe-lite-radiatorov/ permanent;
rewrite ^/info/raschet-sekciy-trubchatogo-radiatora-uglovaya-komnata/?$ /info/raschet-radiatorov-dlya-uglovoy-komnaty/ permanent;
